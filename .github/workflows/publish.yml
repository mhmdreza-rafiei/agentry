name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # Do not set registry-url / NODE_AUTH_TOKEN — Trusted Publisher uses OIDC.
      # An empty _authToken in .npmrc breaks publish when 2FA disallows tokens.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish if version is new
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Package: ${NAME}@${VER}"
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "Already published: ${NAME}@${VER} - skip"
            exit 0
          fi
          echo "Publishing ${NAME}@${VER} via Trusted Publisher (OIDC)..."
          npm publish --access public --provenance
