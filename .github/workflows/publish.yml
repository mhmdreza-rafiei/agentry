name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      # Trusted Publisher requires npm >= 11.5.1 (OIDC). Node 22 image may ship older npm.
      - name: Upgrade npm for OIDC
        run: |
          npm install -g npm@latest
          npm --version
          node --version

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish if version is new
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Package: ${NAME}@${VER}"
          echo "npm $(npm --version)"
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "Already published: ${NAME}@${VER} - skip"
            exit 0
          fi
          echo "Publishing ${NAME}@${VER} via Trusted Publisher (OIDC)..."
          npm publish --access public --provenance
