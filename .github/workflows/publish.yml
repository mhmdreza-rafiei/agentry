name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      # Trusted Publisher requires npm >= 11.5.1 (OIDC). Node 22 image may ship older npm.
      - name: Upgrade npm for OIDC
        run: |
          npm install -g npm@latest
          npm --version
          node --version

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish if version is new
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Package: ${NAME}@${VER}"
          echo "npm $(npm --version)"
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "Already published: ${NAME}@${VER} - skip"
            exit 0
          fi
          echo "Publishing ${NAME}@${VER} via Trusted Publisher (OIDC)..."
          npm publish --access public --provenance
